<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Guild of Mercenaries</title>
    <style>
        .hidden { display: none !important; }
        body { background: #121212; color: #eee; font-family: sans-serif; padding: 20px; }
        .game-container { max-width: 450px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 12px; }
        .btn-option { padding: 10px; margin: 5px; cursor: pointer; }
        .btn-option.active { background: #ffc107; }
        .btn-primary { width: 100%; padding: 15px; background: #ffc107; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="creation-screen">
        <h2>Создание героя</h2>
        <div id="hero-pixel-icon" style="width: 100px; height: 100px; background: #555; margin: 10px auto;"></div>
        
        <label>Пол</label>
        <div>
            <button id="gender-male" class="btn-option active" onclick="setGender('Мужчина')">Муж</button>
            <button id="gender-female" class="btn-option" onclick="setGender('Женщина')">Жен</button>
        </div>

        <label>Раса</label>
        <select id="race-select" onchange="updateHero('race', this.value)">
            <option value="Человек">Человек</option>
            <option value="Кошка">Кошка</option>
            <option value="Эльф">Эльф</option>
        </select>

        <label>Класс</label>
        <select id="class-select" onchange="updateHero('heroClass', this.value)">
            <option value="Мечник">Мечник</option>
            <option value="Лучник">Лучник</option>
            <option value="Маг">Маг</option>
        </select>

        <div id="stats-preview" style="background: #333; padding: 10px; margin-top: 10px;"></div>

        <button class="btn-primary" onclick="startGame()">Отправиться в приключение</button>
    </div>

    <div id="game-main-screen" class="hidden">
        <h2>Главное меню</h2>
        <button>Локации</button>
        <button>Персонаж</button>
    </div>
</div>

<script>
    const gameState = {
        gender: 'Мужчина',
        race: 'Человек',
        heroClass: 'Мечник'
    };

    const raceBaseStats = {
        'Человек': { hp: 20, en: 50, mp: 20 },
        'Кошка':   { hp: 15, en: 70, mp: 15 },
        'Эльф':    { hp: 15, en: 50, mp: 60 }
    };

    const classStatsMod = {
        'Мечник': { hp: 15, en: 10, mp: 0 },
        'Лучник': { hp: 5, en: 20, mp: 5 },
        'Маг':    { hp: -5, en: -10, mp: 40 }
    };

    function updateStatsPreview() {
        const base = raceBaseStats[gameState.race];
        const mod = classStatsMod[gameState.heroClass];
        const preview = document.getElementById('stats-preview');
        preview.innerHTML = `Здоровье: ${base.hp + mod.hp} | Энергия: ${base.en + mod.en} | Мана: ${base.mp + mod.mp}`;
    }

    function setGender(g) {
        gameState.gender = g;
        document.getElementById('gender-male').classList.toggle('active', g === 'Мужчина');
        document.getElementById('gender-female').classList.toggle('active', g === 'Женщина');
    }

    function updateHero(key, val) {
        gameState[key] = val;
        updateStatsPreview();
    }

    function startGame() {
        document.getElementById('creation-screen').classList.add('hidden');
        document.getElementById('game-main-screen').classList.remove('hidden');
    }

    // Запуск при старте
    updateStatsPreview();
</script>

</body>
</html>
