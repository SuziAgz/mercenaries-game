<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guild of Mercenaries</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: #ffcc00;
            margin-bottom: 5px;
        }
        .balance-container {
            background-color: #2a2a2a;
            border: 2px solid #3a3a3a;
            border-radius: 12px;
            padding: 15px;
            width: 90%;
            max-width: 300px;
            margin: 20px 0;
        }
        .coin {
            font-weight: bold;
            display: inline-block;
            margin: 0 5px;
        }
        .btn {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
            width: 90%;
            max-width: 300px;
        }
        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>Гильдия Наёмников</h1>
    <p id="welcome-text">Загрузка данных игрока...</p>

    <div class="balance-container">
        <h3>Твой кошель:</h3>
        <div>🪙 Медь: <span id="copper-val" class="coin" style="color: #cd7f32;">10</span></div>
        <div>🪙 Серебро: <span id="silver-val" class="coin" style="color: #c0c0c0;">0</span></div>
        <div>🪙 Золото: <span id="gold-val" class="coin" style="color: #ffd700;">0</span></div>
        <div>🪙 Платина: <span id="platinum-val" class="coin" style="color: #e5e4e2;">0</span></div>
    </div>

    <button class="btn" id="action-btn">Собрать травы (Алхимия)</button>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        // Получаем имя игрока из Телеграма
        const username = tg.initDataUnsafe?.user?.first_name || "Наёмник";
        document.getElementById('welcome-text').innerText = Приветствуем в Гильдии, ${username}!;

        // Базовая логика кликера для проверки
        let copper = 10;
        const copperEl = document.getElementById('copper-val');
        const btn = document.getElementById('action-btn');

        btn.addEventListener('click', () => {
            copper += 1;
            copperEl.innerText = copper;
            
            // Легкая вибрация телефона при клике для сочности (работает в ТГ)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        });
    </script>
</body>
</html>
